# Fail2ban Telegram 通知 Action
# 部署后路径: /etc/fail2ban/action.d/telegram-notify.conf
#
# 当 fail2ban 触发 ban/unban 事件时，调用 f2b-manager 的桥接脚本
# 发送实时预警到 Telegram。
#
# 由 f2b-manager 自动部署，请勿手动修改。

[Definition]

# ── 服务启动/停止通知 ──
# 当 jail 启动时通知
actionstart = /usr/local/bin/f2b-notify.sh "start" "<name>"

# 当 jail 停止时通知
actionstop = /usr/local/bin/f2b-notify.sh "stop" "<name>"

# ── 检查命令（空操作）──
actioncheck =

# ── ★ 核心: 封禁时通知 ──
# <ip>       - 被封禁的 IP 地址
# <name>     - jail 名称
# <failures> - 失败次数
# <matches>  - 匹配的日志行（可能很长，通知脚本只取前 500 字符）
actionban = /usr/local/bin/f2b-notify.sh "ban" "<ip>" "<name>" "<failures>" "<matches>"

# ── ★ 核心: 解封时通知 ──
actionunban = /usr/local/bin/f2b-notify.sh "unban" "<ip>" "<name>"

# ── 行为配置 ──
# 禁用按需启动（确保 actionstart 在服务启动时执行）
actionstart_on_demand = false

[Init]
# 通知脚本名称
name = default
